[flake8]
max-line-length = 99
max-module-members = 32
max-local-variables = 8
max-expressions = 12
max-cognitive-complexity = 15
max-module-cognitive-complexity = 15

per-file-ignores =
    # Tests use assert, magic values, short names, long patch strings, etc. by design
    tests/*.py:
        E501,
        S101,
        WPS110,
        WPS111,
        WPS118,
        WPS201,
        WPS202,
        WPS204,
        WPS210,
        WPS213,
        WPS214,
        WPS219,
        WPS221,
        WPS226,
        WPS231,
        WPS232,
        WPS301,
        WPS407,
        WPS421,
        WPS430,
        WPS432,
        WPS338,
        WPS441,
        WPS520,
